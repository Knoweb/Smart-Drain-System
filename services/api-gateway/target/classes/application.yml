server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: telemetry-ingestion
          uri: http://localhost:8081
          predicates:
            - Path=/api/telemetry/**
        - id: alert-notification
          uri: http://localhost:8082
          predicates:
            - Path=/api/alerts/**
