server:
  port: 8082

spring:
  application:
    name: alert-notification
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

# Alert Thresholds
alert:
  threshold:
    waterLevel: 80.0
